services:
  postgres:
    image: postgres:16
    container_name: knowledgebook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
      - ../migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7
    container_name: knowledgebook-redis
    restart: unless-stopped
    volumes:
      - ${REDIS_DATA_DIR:-./data/redis}:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  app-server:
    image: ${APP_SERVER_IMAGE}
    container_name: knowledgebook-app-server
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  app-worker:
    image: ${APP_WORKER_IMAGE}
    container_name: knowledgebook-app-worker
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
